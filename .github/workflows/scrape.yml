name: Scrape Price Data

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      query:
        description: 'Specific query to scrape'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install @supabase/supabase-js
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_QUERY: ${{ github.event.inputs.query }}
        run: node scripts/scrape-cron.mjs
      - name: Ping Vercel revalidate
        if: success()
        run: |
          curl -s "https://harga-com.vercel.app/api/ping" --max-time 10 || true
